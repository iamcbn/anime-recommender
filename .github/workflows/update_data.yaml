name: Weekly Data Pipeline Update

on:
  # Run automatically every Sunday at 3:00 AM UTC
  schedule:
    - cron: '0 3 * * 0'
  
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Data Pipeline Docker Image
        run: |
          # We build the image directly instead of using docker-compose
          # because docker-compose would try to spin up a local database.
          # We want to connect straight to our production Supabase DB!
          docker build -t anime-data-pipeline -f backend/data_pipeline/Dockerfile .

      - name: Run Data Pipeline
        run: |
          docker run --rm \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }} \
            -e KAGGLE_KEY=${{ secrets.KAGGLE_KEY }} \
            anime-data-pipeline
