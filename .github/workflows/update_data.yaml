name: Weekly Data Pipeline Update

on:
  # Run automatically every Sunday at 3:00 AM UTC
  schedule:
    - cron: '0 3 * * 0'
  
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Data Pipeline Docker Image
        run: |
          # We build the image directly instead of using docker-compose
          # because docker-compose would try to spin up a local database.
          # We want to connect straight to our production Supabase DB!
          docker build -t anime-data-pipeline -f backend/data_pipeline/Dockerfile .

      - name: Run Data Pipeline
        run: |
          mkdir -p ${{ github.workspace }}/artefacts
          docker run --rm \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }} \
            -e KAGGLE_KEY=${{ secrets.KAGGLE_KEY }} \
            -v ${{ github.workspace }}/artefacts:/app/data_pipeline/artefacts \
            anime-data-pipeline

      - name: Commit dataset state back to repo
        run: |
          # Copy the state file into the tracked directory
          mkdir -p backend/data_pipeline/artefacts
          cp artefacts/.dataset_state.json backend/data_pipeline/artefacts/.dataset_state.json 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data_pipeline/artefacts/.dataset_state.json
          git diff --cached --quiet || git commit -m "chore: update dataset_state.json [skip ci]"
          git push
